  img.src=URL.createObjectURL(file);
}

// ══════════════════════════════════════
//  ANALYSIS
// ══════════════════════════════════════
function runAnalysis(){
  const w=canvas.width, h=canvas.height;
  const bin=binarise(originalImage,w,h);
  const comps=findComponents(bin,w,h);
  const skelBin=skeletonize(bin.slice(),w,h);
  motifResults=comps.map(c=>{
    const border=getBorder(c,w,h,bin);
    const pts=c.filter(p=>skelBin[p])
               .map(p=>({x:p%w,y:Math.floor(p/w)}))
               .sort((a,b)=>a.y-b.y||a.x-b.x);
    const borderSet=new Set(border.map(p=>p.x+','+p.y));
    const pixelSet =new Set(c.map(p=>(p%w)+','+(Math.floor(p/w))));
    const byCol={};
    for(const p of border){ if(!byCol[p.x]) byCol[p.x]=[]; byCol[p.x].push(p.y); }
    const vertRuns=[];
    for(const xStr of Object.keys(byCol)){
      const x=+xStr, ys=byCol[x].sort((a,b)=>a-b);
      let i=0;
      while(i<ys.length){
        const rp=[{x,y:ys[i]}];
        while(i+1<ys.length&&ys[i+1]===ys[i]+1){i++;rp.push({x,y:ys[i]});}
        vertRuns.push({pixels:rp,len:rp.length}); i++;
      }
    }
    const detectedSide=classifyDir(pts);
    return { side:detectedSide, _origSide:detectedSide,
             pixels:c.map(p=>({x:p%w,y:Math.floor(p/w)})),
             border,borderSet,pixelSet,vertRuns };
  });
  hideProc();
  allMotifPixelSet=new Set();
  motifResults.forEach(m=>m.pixels.forEach(p=>allMotifPixelSet.add(p.x+','+p.y)));
  setStatus(`${w}×${h} px  |  ${motifResults.length} motif(s) detected`,'ok');
  syncOverlay();
  erasedSet.clear();
  manualFillRegions=[];
  bakedFloatRegions=[];
  processedImage=null; motifOnlyImage=null;
  ctx.putImageData(originalImage,0,0);
  clearOverlay();
  const bar=document.getElementById('floatCountBar');
  if(bar) bar.textContent='';
  setPhaseStatus('⬤ Processing…');
  // Auto-apply phase 1 after analysis (no undo push — automatic trigger)
  setTimeout(()=>{ applyPhase1(); redraw(); setPhaseStatus('⬤ Ready'); }, 0);
}

function buildCleanBW(rawData,w,h){
  const src=rawData.data;
  const out=new Uint8ClampedArray(w*h*4);
  for(let i=0;i<out.length;i+=4){ out[i]=out[i+1]=out[i+2]=255; out[i+3]=255; }
  for(let i=0;i<w*h;i++){
    const lum=(src[i*4]+src[i*4+1]+src[i*4+2])/3;
    if(lum<180){ out[i*4]=out[i*4+1]=out[i*4+2]=0; out[i*4+3]=255; }
  }
  return new ImageData(out,w,h);
}
function binarise(imgData,w,h){
  const d=imgData.data, bin=new Uint8Array(w*h);
  for(let i=0;i<bin.length;i++) bin[i]=(d[i*4]+d[i*4+1]+d[i*4+2])/3<180?1:0;
  return bin;
}
const wrap=(x,m)=>x<0?m-1:x>=m?0:x;
function findComponents(bin,w,h){
  const seen=new Uint8Array(bin.length), comps=[];
  for(let i=0;i<bin.length;i++){
    if(!bin[i]||seen[i]) continue;
    const stack=[i], comp=[];
    while(stack.length){
      const p=stack.pop(); if(seen[p]) continue;
      seen[p]=1; comp.push(p);
      const x=p%w, y=Math.floor(p/w);
      for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
        if(!dx&&!dy) continue;
        const n=wrap(y+dy,h)*w+wrap(x+dx,w);
        if(bin[n]&&!seen[n]) stack.push(n);
      }
    }
    comps.push(comp);
  }
  return comps;
}
function getBorder(comp,w,h,bin){
  const use8=document.getElementById('chkConnected').checked;
  const edges=[];
  for(const p of comp){
    const x=p%w, y=Math.floor(p/w);
    let isBorder=false;
    if(use8){
      outer: for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
        if(!dx&&!dy) continue;
        if(!bin[wrap(y+dy,h)*w+wrap(x+dx,w)]){ isBorder=true; break outer; }
      }
    } else {
      if(!(bin[wrap(y-1,h)*w+x]&&bin[wrap(y+1,h)*w+x]&&bin[y*w+wrap(x-1,w)]&&bin[y*w+wrap(x+1,w)])) isBorder=true;
    }
    if(isBorder) edges.push({x,y});
  }
  return edges;
}
function getInside(m){ return m.pixels.filter(pt=>!m.borderSet.has(pt.x+','+pt.y)); }
function skeletonize(img,w,h){
  const nb=(x,y)=>{ const g=(xx,yy)=>img[wrap(yy,h)*w+wrap(xx,w)];
    return [g(x,y-1),g(x+1,y-1),g(x+1,y),g(x+1,y+1),g(x,y+1),g(x-1,y+1),g(x-1,y),g(x-1,y-1)]; };
  let changed;
  do{ changed=false;
    [0,1].forEach(s=>{
      const rem=[];
      for(let y=0;y<h;y++) for(let x=0;x<w;x++){
        if(!img[y*w+x]) continue;
        const n=nb(x,y);
        const B=n.reduce((a,v)=>a+v,0);
        const A=n.reduce((a,v,i)=>a+(!v&&n[(i+1)%8]?1:0),0);
        if(B>=2&&B<=6&&A===1&&
           (s?(!n[2]||!n[4]||!n[6]):(!n[0]||!n[2]||!n[4]))&&
           (s?(!n[0]||!n[4]||!n[6]):(!n[2]||!n[4]||!n[6]))) rem.push(y*w+x);
      }
      rem.forEach(p=>img[p]=0); if(rem.length) changed=true;
    });
  }while(changed);
  return img;
}
function classifyDir(pts){
  let L=0,R=0;
  for(let i=1;i<pts.length;i++){
    const dx=pts[i].x-pts[i-1].x, dy=pts[i].y-pts[i-1].y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(dx>0) R+=d; else if(dx<0) L+=d;
  }
  return R>L?'RIGHT':'LEFT';
}
function reanalyse(){
  if(!originalImage) return;
  setPhaseStatus('Re-analysing…'); showProc('Re-detecting motifs…');
  setTimeout(runAnalysis,40);
}
function setPhaseStatus(msg){ const el=document.getElementById('phaseStatus'); if(el) el.textContent=msg; }

// ══════════════════════════════════════
//  HELPER — manual fills ko current fillToolCache se live recompute karke paint karo
//  region.pixels = sirf painted/filtered pixels (mode ke hisaab se)
// ══════════════════════════════════════
function _paintManualFills(outData, w){
  if(!manualFillRegions.length) return;
  // Baked colors use karo — fill time pe store kiye gaye r,g,b values
  // Isse bitmap change karne pe purane fills affect nahi honge
  for(const region of manualFillRegions){
    // Side ke hisaab se normal ya flipped baked pixels use karo
    const pixels = (region.side === 'RIGHT' && region.pixelsFlipped)
      ? region.pixelsFlipped
      : region.pixels;
    for(const fp of pixels){
      const di = (fp.y*w+fp.x)*4;
      outData[di]=fp.r; outData[di+1]=fp.g; outData[di+2]=fp.b; outData[di+3]=255;
    }
  }
}

// ══════════════════════════════════════
//  PHASE 1 — Fill logic
//  INNER_BORDER8 mode mein Float Fill bhi merge hota hai directly
// ══════════════════════════════════════
function _getPhase1Pixels(m, mode, vLen, floatPixelSet){
  // floatPixelSet: Set of "x,y" strings from Float Fill (only used in INNER_BORDER8)
  if(mode==='WHOLE')       return m.pixels;
  if(mode==='INNER')       return getInside(m);
  if(mode==='BORDER')      return m.border;
  const keep=[];
  for(const run of m.vertRuns) if(run.len>=vLen) for(const p of run.pixels) keep.push(p);
  if(mode==='BORDER8')     return keep;
  // INNER_BORDER8: Inside + Vert Border + Float Fill pixels (merged)
  const base = getInside(m).concat(keep);
  if(!floatPixelSet || !floatPixelSet.size) return base;
  // Add float pixels that belong to this motif and aren't already in base
  const baseKeys = new Set(base.map(p=>p.x+','+p.y));
  for(const key of floatPixelSet){
    if(m.pixelSet.has(key) && !baseKeys.has(key)){
      const [x,y] = key.split(',').map(Number);
      base.push({x,y});
    }
  }
  return base;
}

function applyPhase1(){
  if(!originalImage) return;
  const mode=document.getElementById('borderMode').value;
  const w=canvas.width, h=canvas.height;
  const outData=new Uint8ClampedArray(originalImage.data);
  const vLen=Math.max(1,parseInt(document.getElementById('vBorderLen').value)||1);

  // INNER_BORDER8 + Float Fill: pre-compute float pixel set using original as base
  let floatPixelSet = null;
  if(mode==='INNER_BORDER8' && document.getElementById('chkVertFloat').checked){
    const minLen=Math.max(1,parseInt(document.getElementById('vertFloatLen').value)||1);
    floatPixelSet = _computeFloatPixelSet(w, minLen, outData);
  }

  motifResults.forEach(m=>{
    const cache=m.side==='LEFT'?leftFillCache:rightFillCache;
    if(!cache) return;
    const {data:fd,w:fw,h:fh}=cache;
    const pixels = _getPhase1Pixels(m, mode, vLen, floatPixelSet);
    for(const p of pixels){
      if(erasedSet.has(p.x+','+p.y)) continue;
      const si=((p.y%fh)*fw+(p.x%fw))*4, di=(p.y*w+p.x)*4;
      outData[di]=fd[si]; outData[di+1]=fd[si+1]; outData[di+2]=fd[si+2]; outData[di+3]=fd[si+3];
    }
  });
  // Baked Float regions — frozen baked pixel colors use karo (cache se nahi)
  // Colors bake time pe freeze hote hain — bitmap change karne pe affect nahi hota
  for(const region of bakedFloatRegions){
    const pixels = (region.side==='RIGHT' && region.pixelsFlipped)
      ? region.pixelsFlipped : region.pixels;
    for(const p of pixels){
      if(erasedSet.has(p.x+','+p.y)) continue;
      const di=(p.y*w+p.x)*4;
      outData[di]=p.r; outData[di+1]=p.g; outData[di+2]=p.b; outData[di+3]=255;
    }
  }
  // motifOnlyImage = motif fills only, NO manual fills
  motifOnlyImage = new ImageData(new Uint8ClampedArray(outData), w, h);
  // processedImage = motif fills + manual fills (live recomputed from current fillToolCache)
  _paintManualFills(outData, w);
  processedImage=new ImageData(new Uint8ClampedArray(outData),w,h);
}

// Float Fill ke qualified pixels ka flat Set banao — "x,y" keys
function _computeFloatPixelSet(w, minLen, srcData){
  const result = new Set();
  motifResults.forEach(m=>{
    const byCol={};
    for(const p of m.pixels){
      if(erasedSet.has(p.x+','+p.y)) continue;
      const di=(p.y*w+p.x)*4;
      const lum=(srcData[di]+srcData[di+1]+srcData[di+2])/3;
      if(lum>=180) continue;
      if(!byCol[p.x]) byCol[p.x]=[];
      byCol[p.x].push(p.y);
    }
    for(const xStr of Object.keys(byCol)){
      const x=+xStr, ys=byCol[x].sort((a,b)=>a-b);
      let i=0;
      while(i<ys.length){
        const runYs=[ys[i]];
        while(i+1<ys.length&&ys[i+1]===ys[i]+1){i++;runYs.push(ys[i]);} i++;
        if(runYs.length>=minLen){
          const topIsEdge=!m.pixelSet.has(x+','+(runYs[0]-1));
          const botIsEdge=!m.pixelSet.has(x+','+(runYs[runYs.length-1]+1));
          const start=topIsEdge?2:0, end=botIsEdge?runYs.length-2:runYs.length;
          for(let j=start;j<end;j++) result.add(x+','+runYs[j]);
        }
      }
    }
  });
  return result;
}

// ══════════════════════════════════════
//  FLOAT FILL — Phase 2/3
//  INNER_BORDER8 mode mein yeh alag se nahi chalta — applyPhase1 mein merge hota hai
// ══════════════════════════════════════
function computeFloatData(w,minLen,srcData){
  const floatData=[];
  motifResults.forEach(m=>{
    const byCol={};
    for(const p of m.pixels){
      if(erasedSet.has(p.x+','+p.y)) continue;
      const di=(p.y*w+p.x)*4;
      const lum=(srcData[di]+srcData[di+1]+srcData[di+2])/3;
      if(lum>=180) continue;
      if(!byCol[p.x]) byCol[p.x]=[];
      byCol[p.x].push(p.y);
    }
    const qualified=[];
    for(const xStr of Object.keys(byCol)){
      const x=+xStr, ys=byCol[x].sort((a,b)=>a-b);
      let i=0;
      while(i<ys.length){
        const runYs=[ys[i]];
        while(i+1<ys.length&&ys[i+1]===ys[i]+1){i++;runYs.push(ys[i]);} i++;
        if(runYs.length>=minLen){
          const topIsEdge=!m.pixelSet.has(x+','+(runYs[0]-1));
          const botIsEdge=!m.pixelSet.has(x+','+(runYs[runYs.length-1]+1));
          const start=topIsEdge?2:0, end=botIsEdge?runYs.length-2:runYs.length;
          for(let j=start;j<end;j++) qualified.push({x,y:runYs[j]});
        }
      }
    }
    if(qualified.length) floatData.push({m,pixels:qualified});
  });
  return floatData;
}

function runProcess(skipUndo=false){
  if(!originalImage){ setPhaseStatus('No image loaded'); return; }
  if(!skipUndo) pushUndo();
  applyPhase1();
  const floatChk=document.getElementById('chkVertFloat');
  const bar=document.getElementById('floatCountBar');
  const mode=document.getElementById('borderMode').value;

  if(floatChk.checked&&motifResults.length){
    const w=canvas.width;
    const minLen=Math.max(1,parseInt(document.getElementById('vertFloatLen').value)||1);

    if(mode==='INNER_BORDER8'){
      // Float Fill already merged into applyPhase1 for INNER_BORDER8
      // Count float pixels for status
      const floatSet=_computeFloatPixelSet(w,minLen,originalImage.data);
      floatChk.checked=false;
      if(bar) bar.textContent='';
      ctx.putImageData(processedImage,0,0); clearOverlay();
      setPhaseStatus(`Phase 1 ✔ → Float merged in Inside+Vert  •  ${floatSet.size} float px`);
    } else {
      // Separate float pass for other modes
      const floatData=computeFloatData(w,minLen,motifOnlyImage.data);
      let totalFloatPx=0;
      const outData=new Uint8ClampedArray(motifOnlyImage.data);
      // manualFillRegion.side map — float pixel ke adjacent neighbour ka side jaanna ke liye
      const manualPxSideMap = new Map();
      for(const region of manualFillRegions){
        const s = region.side || 'LEFT';
        for(const fp of region.pixels) manualPxSideMap.set(fp.x+','+fp.y, s);
      }
      // Reset baked float regions — fresh bake
      bakedFloatRegions = [];

      for(const {m,pixels} of floatData){
        const motifCache=m.side==='LEFT'?leftFillCache:rightFillCache;
        // Adjacent (fillTool) pixels aur non-adjacent (motif) pixels ko alag track karo
        // kyunki unke switch caches alag hote hain
        const normPixelSet = new Set(), normPixels = [];   // motif weave float pixels
        const ftPixelSet   = new Set(), ftPixels   = [];   // fillTool weave float pixels

        for(const p of pixels){
          if(erasedSet.has(p.x+','+p.y)) continue;
          const neighbors=[
            p.x+','+(p.y-1), p.x+','+(p.y+1),
            (p.x-1)+','+p.y, (p.x+1)+','+p.y,
          ];
          // Neighbour ki side dekho — default LEFT (motif)
          let adjSide = null;
          for(const nk of neighbors){
            if(manualPxSideMap.has(nk)){ adjSide = manualPxSideMap.get(nk); break; }
          }
          const adjacentToManual = adjSide !== null;
          const activeFillCache  = fillToolCache || motifCache;
          const cache = adjacentToManual ? activeFillCache : motifCache;
          if(!cache) continue;
          const {data:fd,w:fw,h:fh}=cache;
          const si=((p.y%fh)*fw+(p.x%fw))*4, di=(p.y*w+p.x)*4;
          outData[di]=fd[si]; outData[di+1]=fd[si+1]; outData[di+2]=fd[si+2]; outData[di+3]=fd[si+3];
          totalFloatPx++;
          if(adjacentToManual){
            ftPixelSet.add(p.x+','+p.y);
            ftPixels.push({x:p.x, y:p.y});
          } else {
            normPixelSet.add(p.x+','+p.y);
            normPixels.push({x:p.x, y:p.y});
          }
        }
        // Non-adjacent float pixels: motif weave — r,g,b bake time pe freeze karo
        if(normPixelSet.size > 0){
          const normCacheFlip = buildFillCacheFlipped(motifCache);
          const {data:fn,w:fwn,h:fhn}=motifCache;
          const {data:fnf,w:fwnf,h:fhnf}=normCacheFlip;
          const normBaked = normPixels.map(p=>{
            const si=((p.y%fhn)*fwn+(p.x%fwn))*4;
            return {x:p.x,y:p.y,r:fn[si],g:fn[si+1],b:fn[si+2]};
          });
          const normBakedFlip = normPixels.map(p=>{
            const si=((p.y%fhnf)*fwnf+(p.x%fwnf))*4;
            return {x:p.x,y:p.y,r:fnf[si],g:fnf[si+1],b:fnf[si+2]};
          });
          bakedFloatRegions.push({ motif:m, pixelSet:normPixelSet,
            pixels:normBaked, pixelsFlipped:normBakedFlip,
            isFillTool:false, side:'LEFT' });
        }
        // Adjacent float pixels: fillTool weave — r,g,b bake time pe freeze karo
        if(ftPixelSet.size > 0){
          const ftCacheN = fillToolCache || motifCache;
          const ftCacheF = fillToolCacheFlipped || buildFillCacheFlipped(ftCacheN);
          const {data:fft,w:fwft,h:fhft}=ftCacheN;
          const {data:fftf,w:fwftf,h:fhftf}=ftCacheF;
          const ftBaked = ftPixels.map(p=>{
            const si=((p.y%fhft)*fwft+(p.x%fwft))*4;
            return {x:p.x,y:p.y,r:fft[si],g:fft[si+1],b:fft[si+2]};
          });
          const ftBakedFlip = ftPixels.map(p=>{
            const si=((p.y%fhftf)*fwftf+(p.x%fwftf))*4;
            return {x:p.x,y:p.y,r:fftf[si],g:fftf[si+1],b:fftf[si+2]};
          });
          bakedFloatRegions.push({ motif:m, pixelSet:ftPixelSet,
            pixels:ftBaked, pixelsFlipped:ftBakedFlip,
            isFillTool:true, side:'LEFT' });
        }
      }
      // Store baked result as new motifOnlyImage so future flood detection is still clean
      motifOnlyImage=new ImageData(new Uint8ClampedArray(outData),w,canvas.height);
      // Manual fills LAST — live recomputed from current fillToolCache (hamesha upar)
      _paintManualFills(outData, w);
      processedImage=new ImageData(new Uint8ClampedArray(outData),w,canvas.height);
      floatChk.checked=false;
      if(bar) bar.textContent='';
      ctx.putImageData(processedImage,0,0); clearOverlay();
      setPhaseStatus(`Phase 1 ✔ → Phase 2→3 ✔ baked  •  ${totalFloatPx} float px filled`);
    }
  } else {
    ctx.putImageData(processedImage,0,0); clearOverlay();
    if(bar) bar.textContent='';
    setPhaseStatus('');
  }
}

function redraw(){
  if(!originalImage) return;
  const w=canvas.width, h=canvas.height;
  const floatOn=document.getElementById('chkVertFloat').checked;
  const minLen=Math.max(1,parseInt(document.getElementById('vertFloatLen').value)||1);
  const mode=document.getElementById('borderMode').value;
  const vLen=Math.max(1,parseInt(document.getElementById('vBorderLen').value)||1);

  // Base: use processedImage if available, else compute live motif fills on top of original
  let outData;
  if(processedImage){
    outData = new Uint8ClampedArray(processedImage.data);
  } else {
    // Live-compute motif fills so Switch/Erase are visible before Process is clicked
    outData = new Uint8ClampedArray(originalImage.data);
    // For INNER_BORDER8 + Float: pre-compute float set using originalImage (manual fills ke bina)
    let floatPixelSet = null;
    if(mode==='INNER_BORDER8' && floatOn){
      floatPixelSet = _computeFloatPixelSet(w, minLen, originalImage.data);
    }
    motifResults.forEach(m=>{
      const cache = m.side==='LEFT' ? leftFillCache : rightFillCache;
      if(!cache) return;
      const {data:fd,w:fw,h:fh} = cache;
      const pixels = _getPhase1Pixels(m, mode, vLen, floatPixelSet);
      for(const p of pixels){
        if(erasedSet.has(p.x+','+p.y)) continue;
        const si=((p.y%fh)*fw+(p.x%fw))*4, di=(p.y*w+p.x)*4;
        outData[di]=fd[si]; outData[di+1]=fd[si+1]; outData[di+2]=fd[si+2]; outData[di+3]=fd[si+3];
      }
    });
  }

  let floatData=[];
  let totalFloatPx=0;

  // ── Float Fill — INNER_BORDER8 mein already merged, baaki modes mein alag pass ──
  // srcData = motifOnlyImage (manual fills ke bina) — warna Fill Tool ke painted pixels
  //           Float Fill ko light pixels lagte hain aur woh skip ho jaata hai
  if(floatOn && motifResults.length && mode!=='INNER_BORDER8'){
    const srcData = motifOnlyImage ? motifOnlyImage.data : originalImage.data;
    // manualFill painted pixels → side map ("x,y" → 'LEFT'/'RIGHT')
    const manualPxSideMap = new Map();
    for(const region of manualFillRegions){
      const s = region.side || 'LEFT';
      for(const fp of region.pixels) manualPxSideMap.set(fp.x+','+fp.y, s);
    }
    // Normal fillToolCache and its flip
    const ftCacheN = fillToolCache || leftFillCache || rightFillCache;
    const ftCacheF = ftCacheN ? (fillToolCacheFlipped || buildFillCacheFlipped(ftCacheN)) : null;

    floatData=computeFloatData(w,minLen,srcData);
    for(const {m,pixels} of floatData){
      const motifCache = m.side==='LEFT' ? leftFillCache : rightFillCache;
      for(const p of pixels){
        if(erasedSet.has(p.x+','+p.y)) continue;
        if(manualPxSideMap.has(p.x+','+p.y)) continue; // manual fill ke upar Float nahi

        const neighbors = [
          (p.x)+','+(p.y-1), (p.x)+','+(p.y+1),
          (p.x-1)+','+p.y,   (p.x+1)+','+p.y,
        ];
        // Neighbour ka side dekho — agar adjacent to manual fill hai
        let adjSide = null;
        for(const nk of neighbors){
          if(manualPxSideMap.has(nk)){ adjSide = manualPxSideMap.get(nk); break; }
        }

        let cache;
        if(adjSide !== null){
          // Adjacent to manual fill — fillTool weave use karo, side ke hisaab se
          cache = (adjSide==='RIGHT' && ftCacheF) ? ftCacheF : ftCacheN;
        } else {
          cache = motifCache;
        }
        if(!cache) continue;
        const {data:fd,w:fw,h:fh}=cache;
        const si=((p.y%fh)*fw+(p.x%fw))*4, di=(p.y*w+p.x)*4;
        outData[di]=fd[si]; outData[di+1]=fd[si+1]; outData[di+2]=fd[si+2]; outData[di+3]=fd[si+3];
        totalFloatPx++;
      }
    }
  } else if(floatOn && motifResults.length && mode==='INNER_BORDER8' && !processedImage){
    // Already merged above in live preview; count for display
    const floatSet=_computeFloatPixelSet(w,minLen,originalImage.data);
    totalFloatPx=floatSet.size;
    floatData=[{stub:true}]; // non-empty so status bar shows
  }

  // ── Manual fills HAMESHA LAST — current fillToolCache se live recompute ──
  _paintManualFills(outData, w);

  // ── Pen edits — non-destructive layer, always on top ──
  if(penEdits.size){
    for(const [key, col] of penEdits){
      const [x,y] = key.split(',').map(Number);
      if(x<0||x>=w||y<0||y>=h) continue;
      const di=(y*w+x)*4;
      outData[di]=col.r; outData[di+1]=col.g; outData[di+2]=col.b; outData[di+3]=255;
    }
  }

  ctx.putImageData(new ImageData(outData,w,h),0,0);

  // ── Highlight float — scan current canvas data and draw red overlay ──
  if(highlightFloatActive){
    const hlLen = Math.max(1, parseInt(document.getElementById('highlightLen').value)||1);
    highlightPixelSet = _computeHighlightPixels(outData, w, h, hlLen);
  }
  clearOverlay(); // redraws highlight on overlay + clears poly (poly redraws itself)

  const bar=document.getElementById('floatCountBar');
  if(floatOn&&floatData.length){
    if(bar) bar.textContent=`${mode==='INNER_BORDER8'?'merged':'float'}  •  ${totalFloatPx} px  — click ↓ Bake Float to apply`;
    setPhaseStatus(`Float preview: ${totalFloatPx} px — click ↓ Bake Float to apply`);
  } else {
    if(bar) bar.textContent='';
    if(processedImage) setPhaseStatus('');
  }
}

function applyScale(){
  canvas.style.width=(canvas.width*scale)+'px'; canvas.style.height=(canvas.height*scale)+'px';
  overlayCanvas.style.width=canvas.style.width; overlayCanvas.style.height=canvas.style.height;
  document.getElementById('zoomBadge').textContent=scale+'x';
}
function zoomStep(dir){
  if(!originalImage) return;
  const oldScale=scale;
  if(dir>0){if(scale>=MAX_SCALE)return;scale++;}else{if(scale<=1)return;scale--;}
  const cx=viewport.scrollLeft+viewport.clientWidth/2, cy=viewport.scrollTop+viewport.clientHeight/2;
  applyScale();
  const ratio=scale/oldScale;
  viewport.scrollLeft=cx*ratio-viewport.clientWidth/2;
  viewport.scrollTop=cy*ratio-viewport.clientHeight/2;
}
function fitCanvas(){
  if(!canvas.width||!canvas.height) return;
  const vp=viewport;
  const sx=Math.floor((vp.clientWidth-32)/canvas.width), sy=Math.floor((vp.clientHeight-32)/canvas.height);
  scale=Math.max(1,Math.min(sx,sy,MAX_SCALE)); applyScale();
  requestAnimationFrame(()=>{
    vp.scrollLeft=Math.max(0,(vp.scrollWidth-vp.clientWidth)/2);
    vp.scrollTop=Math.max(0,(vp.scrollHeight-vp.clientHeight)/2);
  });
}
viewport.addEventListener('wheel',e=>{
  if(!originalImage) return; e.preventDefault();
  const vr=viewport.getBoundingClientRect(), cr=canvas.getBoundingClientRect();
  const imgX=(e.clientX-cr.left)/scale, imgY=(e.clientY-cr.top)/scale;
  const cvScrollX=cr.left-vr.left+viewport.scrollLeft, cvScrollY=cr.top-vr.top+viewport.scrollTop;
  const mouseVpX=e.clientX-vr.left, mouseVpY=e.clientY-vr.top;
  const oldScale=scale;
  if(e.deltaY<0){if(scale<MAX_SCALE)scale++;}else{if(scale>1)scale--;}
  if(scale===oldScale) return;
  applyScale();
  const ratio=scale/oldScale;
  viewport.scrollLeft=cvScrollX*ratio+imgX*scale-mouseVpX;
  viewport.scrollTop=cvScrollY*ratio+imgY*scale-mouseVpY;
},{passive:false});

let _cursorCanvasX = -1, _cursorCanvasY = -1;  // current canvas pixel under cursor

viewport.addEventListener('mousemove',e=>{
  if(!originalImage) return;
  const cr=canvas.getBoundingClientRect();
  const x=Math.floor((e.clientX-cr.left)/scale), y=Math.floor((e.clientY-cr.top)/scale);
  if(x>=0&&x<canvas.width&&y>=0&&y<canvas.height){
    _cursorCanvasX=x; _cursorCanvasY=y;
    document.getElementById('coordBar').textContent=`x:${x}  y:${y}  scale:${scale}x`;
  } else {
    _cursorCanvasX=-1; _cursorCanvasY=-1;
  }
});

//  BMP EXPORT  — 8-bit indexed, fully standard, opens in all software
// ══════════════════════════════════════

// ── Nearest palette entry (Euclidean RGB) ──
function nearestPalIdx(r,g,b,pal){
  let best=0, bestD=Infinity;
  for(let i=0;i<pal.length;i++){
    const dr=r-pal[i].r, dg=g-pal[i].g, db=b-pal[i].b;
    const d=dr*dr+dg*dg+db*db;
    if(d<bestD){bestD=d;best=i;if(d===0)break;}
  }
  return best;
}

// ── Median-cut quantization on unique colors (fast even for large images) ──
function medianCutPalette(uniq, maxColors){
  // uniq = [{r,g,b,count}, ...]
  if(uniq.length <= maxColors){
    const pal = uniq.map(c=>({r:c.r,g:c.g,b:c.b}));
    while(pal.length < maxColors) pal.push({r:0,g:0,b:0});
    return pal;
  }
  let buckets = [uniq.slice()];
  while(buckets.length < maxColors){
    // Find bucket with largest colour range (weighted by count doesn't matter for range)
    let bi=0, bestR=0;
    for(let i=0;i<buckets.length;i++){
      const bk=buckets[i];
      let mn=[255,255,255],mx=[0,0,0];
      for(const {r,g,b} of bk){
        if(r<mn[0])mn[0]=r;if(r>mx[0])mx[0]=r;
        if(g<mn[1])mn[1]=g;if(g>mx[1])mx[1]=g;
        if(b<mn[2])mn[2]=b;if(b>mx[2])mx[2]=b;
      }
      const rng=Math.max(mx[0]-mn[0],mx[1]-mn[1],mx[2]-mn[2]);
      if(rng>bestR){bestR=rng;bi=i;}
    }
    if(bestR===0) break;
    const bk=buckets.splice(bi,1)[0];
    // Find widest channel
    let mn=[255,255,255],mx=[0,0,0];
    for(const {r,g,b} of bk){
      if(r<mn[0])mn[0]=r;if(r>mx[0])mx[0]=r;
      if(g<mn[1])mn[1]=g;if(g>mx[1])mx[1]=g;
      if(b<mn[2])mn[2]=b;if(b>mx[2])mx[2]=b;
    }
    const ranges=[mx[0]-mn[0],mx[1]-mn[1],mx[2]-mn[2]];
    const ch=['r','g','b'][ranges.indexOf(Math.max(...ranges))];
    bk.sort((a,b2)=>a[ch]-b2[ch]);
    // Split at median weighted by count
    let total=bk.reduce((s,c)=>s+c.count,0), half=0, mid=0;
    for(let i=0;i<bk.length;i++){
      half+=bk[i].count;
      if(half*2>=total){mid=i+1;break;}
    }
    if(mid===0||mid===bk.length) mid=Math.floor(bk.length/2);
    buckets.push(bk.slice(0,mid), bk.slice(mid));
  }
  // Average each bucket (weighted by pixel count)
  return buckets.filter(b=>b.length>0).map(bk=>{
    let sr=0,sg=0,sb=0,sc=0;
    for(const {r,g,b,count} of bk){sr+=r*count;sg+=g*count;sb+=b*count;sc+=count;}
    return {r:Math.round(sr/sc),g:Math.round(sg/sc),b:Math.round(sb/sc)};
  });
}

function canvasToBMP(){
  const w=canvas.width, h=canvas.height;
  const px=ctx.getImageData(0,0,w,h).data;
  const nPx=w*h;

  // ── 1. Collect unique colours with pixel counts ──
  const cntMap=new Map(); // packed 24-bit RGB → count
  for(let i=0;i<nPx*4;i+=4){
    const key=(px[i]<<16)|(px[i+1]<<8)|px[i+2];
    cntMap.set(key,(cntMap.get(key)||0)+1);
  }
  const uniq=Array.from(cntMap.entries()).map(([k,count])=>({
    r:(k>>16)&0xff, g:(k>>8)&0xff, b:k&0xff, count
  }));

  // ── 2. Build 256-entry palette ──
  const palette = medianCutPalette(uniq, 256); // exactly 256 entries

  // ── 3. Build fast lookup: packed RGB → palette index ──
  //    For exact matches use a Map; misses fall back to nearest search
  const exactMap=new Map();
  palette.forEach((c,i)=>exactMap.set((c.r<<16)|(c.g<<8)|c.b, i));
  // Cache for near-match lookups so we don't re-search the same colour repeatedly
  const nearCache=new Map();
  function getIdx(r,g,b){
    const key=(r<<16)|(g<<8)|b;
    let idx=exactMap.get(key);
    if(idx!==undefined) return idx;
    idx=nearCache.get(key);
    if(idx!==undefined) return idx;
    idx=nearestPalIdx(r,g,b,palette);
    nearCache.set(key,idx);
    return idx;
  }

  // ── 4. Write standard 8-bit BMP ──
  // File layout: BITMAPFILEHEADER(14) + BITMAPINFOHEADER(40) + ColorTable(1024) + PixelData
  const rowStride = Math.ceil(w/4)*4;       // rows padded to 4-byte boundary
  const pixelBytes = rowStride * h;
  const dataOffset = 14+40+256*4;           // = 1078  (0x436)
  const fileSize   = dataOffset + pixelBytes;

  const buf=new ArrayBuffer(fileSize);
  const dv=new DataView(buf);
  const u8=new Uint8Array(buf);

  // BITMAPFILEHEADER
  u8[0]=0x42; u8[1]=0x4D;               // Signature 'BM'
  dv.setUint32(2, fileSize,   true);     // bfSize
  dv.setUint32(6, 0,          true);     // bfReserved1+2
  dv.setUint32(10, dataOffset,true);     // bfOffBits

  // BITMAPINFOHEADER
  dv.setUint32(14, 40,         true);    // biSize
  dv.setInt32 (18, w,          true);    // biWidth
  dv.setInt32 (22, h,          true);    // biHeight — positive = bottom-to-top (standard)
  dv.setUint16(26, 1,          true);    // biPlanes
  dv.setUint16(28, 8,          true);    // biBitCount = 8
  dv.setUint32(30, 0,          true);    // biCompression = BI_RGB (no compression)
  dv.setUint32(34, pixelBytes, true);    // biSizeImage
  dv.setInt32 (38, 3780,       true);    // biXPelsPerMeter = 96 DPI
  dv.setInt32 (42, 3780,       true);    // biYPelsPerMeter = 96 DPI
  dv.setUint32(46, 256,        true);    // biClrUsed
  dv.setUint32(50, 0,          true);    // biClrImportant (0 = all important)

  // Color table — 256 × 4 bytes (Blue, Green, Red, Reserved=0)
  let off=54;
  for(const {r,g,b} of palette){
    u8[off++]=b; u8[off++]=g; u8[off++]=r; u8[off++]=0;
  }

  // Pixel data — rows stored bottom-to-top (positive biHeight standard)
  off = dataOffset;
  for(let y=h-1; y>=0; y--){
    for(let x=0; x<w; x++){
      const si=(y*w+x)*4;
      u8[off++]=getIdx(px[si],px[si+1],px[si+2]);
    }
    for(let p=w; p<rowStride; p++) u8[off++]=0; // row padding
  }

  return u8;
}

function _doExport(){
  const rawName = document.getElementById('emFileName').value.trim();
  const folder  = document.getElementById('emFolderPath').value.trim();
  const fileName = (rawName ? rawName.replace(/\.bmp$/i,'') : 'motif_export') + '.bmp';
  // Save folder permanently in localStorage
  if(folder){ _lastFolderPath = folder; try{ localStorage.setItem('motifExportFolder', folder); } catch(_){} }
  document.getElementById('exportModal').classList.remove('show');
  setStatus('Building 8-bit BMP...','busy');
  setTimeout(async ()=>{
    const bmpBytes = canvasToBMP();
    const blob = new Blob([bmpBytes],{type:'image/bmp'});
    // If we have a dir handle, write directly into that folder
    if(_savedDirHandle){
      try{
        const fileHandle = await _savedDirHandle.getFileHandle(fileName, { create: true });
        const ws = await fileHandle.createWritable();
        await ws.write(blob);
        await ws.close();
        setStatus('Saved: '+fileName+'  →  '+(_lastFolderPath||_savedDirHandle.name),'ok');
        return;
      } catch(err){ console.warn('Direct folder write failed, falling back to download:', err); }
    }
    // Fallback: browser download
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    const note = folder ? '  —  '+folder : '';
    setStatus('Downloaded: '+fileName+note,'ok');
  }, 0);
}

document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('emBtnSave').onclick = _doExport;
  document.getElementById('emBtnCancel').onclick = ()=>{
    document.getElementById('exportModal').classList.remove('show');
    setStatus('Export cancelled','');
  };
  // Browse Folder button — works in all browsers
  document.getElementById('emBtnBrowseFolder').onclick = async ()=>{
    if(window.showDirectoryPicker){
      // Chrome / Edge: native folder picker with full write access
      try{
        const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        _savedDirHandle = dirHandle;
        const path = dirHandle.name;
        document.getElementById('emFolderPath').value = path;
        _lastFolderPath = path;
        try{ localStorage.setItem('motifExportFolder', path); } catch(_){}
        document.getElementById('emFolderHint').textContent = 'Folder "' + path + '" selected and saved!';
      } catch(err){
        if(err.name !== 'AbortError') console.error(err);
      }
    } else {
      // Firefox / Safari: use webkitdirectory input to read the folder path
      document.getElementById('emFolderInput').click();
    }
  };

  // webkitdirectory fallback — fires when user picks a folder in Firefox/Safari
  document.getElementById('emFolderInput').addEventListener('change', function(){
    const file = this.files[0];
    if(!file) return;
    // webkitRelativePath = "FolderName/..." — extract just the folder name
    let path = '';
    if(file.webkitRelativePath){
      path = file.webkitRelativePath.split('/')[0];
    } else {
      path = file.name;
    }
    document.getElementById('emFolderPath').value = path;
    _lastFolderPath = path;
    try{ localStorage.setItem('motifExportFolder', path); } catch(_){}
    document.getElementById('emFolderHint').textContent = 'Folder "' + path + '" selected and saved!';
    this.value = ''; // reset so same folder can be picked again
  });
  document.getElementById('exportModal').addEventListener('click', e=>{
    if(e.target === document.getElementById('exportModal')){
      document.getElementById('exportModal').classList.remove('show');
      setStatus('Export cancelled','');
    }
  });
  document.getElementById('emFileName').addEventListener('keydown', e=>{
    if(e.key==='Enter') document.getElementById('emFolderPath').focus();
  });
  document.getElementById('emFolderPath').addEventListener('keydown', e=>{
    if(e.key==='Enter') _doExport();
    if(e.key==='Escape'){
      document.getElementById('exportModal').classList.remove('show');
      setStatus('Export cancelled','');
    }
  });
});
</script>
</body>
</html>
